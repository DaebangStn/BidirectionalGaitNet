[workspace]
name = "bidirectional-gait-net"
version = "0.1.0"
description = "Bidirectional GaitNet with PPO and hierarchical muscle control"
channels = ["conda-forge", "pytorch"]
platforms = ["linux-64"]

[system-requirements]
cuda = "12"

[dependencies]
python = "3.10.*"
assimp = "5.4.2.*"
boost = "1.84.0.*"
boost-cpp = "1.84.0.*"
bullet = "3.25.*"
bullet-cpp = "3.25.*"
cuda-cudart = "12.*"
cuda-nvrtc = "12.*"
cuda-nvtx = "12.*"
cuda-version = "12.*"
eigen = "3.4.0.*"
fcl = "0.7.0.*"
fmt = "==12.1.0"
gcc_impl_linux-64 = "14.1.0.*"
gcc_linux-64 = "14.1.0.*"
glad = "*"
gxx_impl_linux-64 = "14.1.0.*"
gxx_linux-64 = "14.1.0.*"
h5py = "*"
hdf5 = "*"
ezc3d = "*"
dill = "*"
tinyxml2 = "*"
kernel-headers_linux-64 = "3.10.0.*"
libboost = "1.84.0.*"
libboost-devel = "1.84.0.*"
libboost-headers = "1.84.0.*"
libboost-python = "1.84.0.*"
libboost-python-devel = "1.84.0.*"
libccd-double = "2.1.*"
libgcc = "14.1.0.*"
libgcc-devel_linux-64 = "14.1.0.*"
libgcc-ng = "14.1.0.*"
libgcrypt-lib = "1.11.1.*"
matplotlib = "*"
ncurses = "6.5.*"
numpy = "1.23.4.*"
pip = "*"
polars = "*"
pybind11 = "*"
pybind11-global = "*"
pybullet = "3.25.*"
pytest = "*"
pyyaml = "*"
scipy = "*"
setuptools = "*"
tqdm = "*"
umap-learn = "0.5.6.*"
xarray = "*"
h5netcdf = "*"
yaml-cpp = "*"
psutil = "*"
netCDF4 = "*"
yaml = "*"
pytorch-gpu = "==2.10.0"
cudnn = ">=9.10.2.21,<10"
cmake = ">=3.24"

[target.linux-64.dependencies]
cuda-cudart_linux-64 = "12.*"

[pypi-dependencies]
bvh = "*"
click = "==8.0.4"
c3d = "*"
dm-tree = "*"
scikit-image = "==0.23.0"
pyarrow = "==14.0.2"
ray = {version = "==2.12.0", extras = ["rllib", "client"]}

[activation]
env = { DISPLAY = ":0" }

[tasks]
install-deps  = "bash -c 'set -euo pipefail; P=$(pwd); I=$P/libs/install; export CC=$CONDA_PREFIX/bin/x86_64-conda-linux-gnu-gcc CXX=$CONDA_PREFIX/bin/x86_64-conda-linux-gnu-g++; mkdir -p $I; SYSROOT=$CONDA_PREFIX/x86_64-conda-linux-gnu/sysroot/usr/include; for hdr_dir in GL GLFW; do if [ -d /usr/include/$hdr_dir ]; then echo Staging $hdr_dir headers into conda sysroot; rm -rf $SYSROOT/$hdr_dir; cp -r /usr/include/$hdr_dir $SYSROOT/$hdr_dir; fi; done; echo ==== Building DART ====; cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=$I -DCMAKE_INSTALL_RPATH_USE_LINK_PATH=TRUE -DCMAKE_INSTALL_RPATH=$I -DCMAKE_PREFIX_PATH=$CONDA_PREFIX -DDART_BUILD_DARTPY=false -DBUILD_SHARED_LIBS=true -DDART_BUILD_GUI_OSG=false -DDART_ENABLE_SIMD=true -DOpenGL_GL_PREFERENCE=GLVND -DOPENGL_INCLUDE_DIR=/usr/include -DOPENGL_gl_LIBRARY=/usr/lib/x86_64-linux-gnu/libGL.so -DOPENGL_glu_LIBRARY=/usr/lib/x86_64-linux-gnu/libGLU.so -DGLUT_glut_LIBRARY=/usr/lib/x86_64-linux-gnu/libglut.so -DGLUT_INCLUDE_DIR=/usr/include -S $P/libs/dart -B $P/libs/dart/build && ninja -C $P/libs/dart/build install; echo ==== Building Ceres ====; cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=$I -DBUILD_TESTING=OFF -DBUILD_EXAMPLES=OFF -DBUILD_BENCHMARKS=OFF -DBUILD_SHARED_LIBS=OFF -DUSE_CUDA=OFF -S $P/libs/ceres-solver -B $P/libs/ceres-solver/build && ninja -C $P/libs/ceres-solver/build install; echo ==== Done ===='"
setup-machine = { cmd = "bash -c 'echo \"Presets: release  debug  a6000  gait\"; printf \"Enter preset name: \"; read p; printf \"%s\" \"$p\" > .machine; echo \"Wrote .machine = $p\"'" }
configure     = "bash -c '[ -f .machine ] || { echo \"Run: pixi run setup-machine\"; exit 1; }; cmake --preset $(cat .machine)'"
build         = "bash -c '[ -f .machine ] || { echo \"Run: pixi run setup-machine\"; exit 1; }; [ -f build/$(cat .machine)/CMakeCache.txt ] || cmake --preset $(cat .machine); ninja -C build/$(cat .machine) -j16 -l12'"
render-ckpt         = "bash -c 'PRESET=$(cat .machine 2>/dev/null || echo release); CKPT=$1; [ -d \"$CKPT\" ] || CKPT=\"runs/$CKPT\"; shift; exec build/${PRESET}/viewer/render_ckpt \"$CKPT\" \"$@\"' _"
surgery             = "bash -c 'PRESET=$(cat .machine 2>/dev/null || echo release); exec build/${PRESET}/surgery/surgery_tool \"$@\"' _"
motion-editor       = "bash -c 'PRESET=$(cat .machine 2>/dev/null || echo release); exec build/${PRESET}/viewer/motion_editor \"$@\"' _"
marker-editor       = "bash -c 'PRESET=$(cat .machine 2>/dev/null || echo release); exec build/${PRESET}/viewer/marker_editor \"$@\"' _"
muscle-personalizer = "bash -c 'PRESET=$(cat .machine 2>/dev/null || echo release); exec build/${PRESET}/viewer/muscle_personalizer \"$@\"' _"
physical-exam       = "bash -c 'PRESET=$(cat .machine 2>/dev/null || echo release); exec build/${PRESET}/surgery/physical_exam \"$@\"' _"
c3d-inspect         = "bash -c 'PRESET=$(cat .machine 2>/dev/null || echo release); exec build/${PRESET}/tools/c3d_inspect \"$@\"' _"
c3d-processor       = "bash -c 'PRESET=$(cat .machine 2>/dev/null || echo release); exec build/${PRESET}/viewer/c3d_processor \"$@\"' _"
train-bgn      = "python -c 'from python.scripts import train_bgn; train_bgn()'"
train-fgn      = "python -c 'from python.scripts import train_fgn; train_fgn()'"
train-main     = "python -m python.train"
train-pipeline = "python -c 'from python.scripts import train_pipeline; train_pipeline()'"
rollout        = "python -m python.rollout.rollout_cli"
extract-cycle  = "python -c 'from python.scripts import extract_cycle; extract_cycle()'"
