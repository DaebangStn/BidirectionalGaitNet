[workspace]
name = "bidirectional-gait-net"
version = "0.1.0"
description = "Bidirectional GaitNet with PPO and hierarchical muscle control"
channels = ["conda-forge", "pytorch"]
platforms = ["linux-64"]

[system-requirements]
cuda = "12"

[dependencies]
python = "3.10.*"
assimp = "5.4.2.*"
boost = "1.84.0.*"
boost-cpp = "1.84.0.*"
bullet = "3.25.*"
bullet-cpp = "3.25.*"
cuda-cudart = "12.4.*"
cuda-nvrtc = "12.4.*"
cuda-nvtx = "12.4.*"
cuda-version = "12.4.*"
eigen = "3.4.0.*"
fcl = "0.7.0.*"
fmt = "11.0.2.*"
gcc_impl_linux-64 = "14.1.0.*"
gcc_linux-64 = "14.1.0.*"
glad = "*"
glfw = "*"
gxx_impl_linux-64 = "14.1.0.*"
gxx_linux-64 = "14.1.0.*"
h5py = "*"
hdf5 = "*"
ezc3d = "*"
dill = "*"
tinyxml2 = "*"
kernel-headers_linux-64 = "3.10.0.*"
libboost = "1.84.0.*"
libboost-devel = "1.84.0.*"
libboost-headers = "1.84.0.*"
libboost-python = "1.84.0.*"
libboost-python-devel = "1.84.0.*"
libccd-double = "2.1.*"
libgcc = "14.1.0.*"
libgcc-devel_linux-64 = "14.1.0.*"
libgcc-ng = "14.1.0.*"
libgcrypt-lib = "1.11.1.*"
matplotlib = "*"
ncurses = "6.5.*"
numpy = "1.23.4.*"
pip = "*"
polars = "*"
pybind11 = "*"
pybind11-global = "*"
pybullet = "3.25.*"
pytest = "*"
pytorch = {version = "2.3.0.*", build = "cuda120_py310h2c91c31_301"}
pyyaml = "*"
scipy = "*"
setuptools = "*"
tqdm = "*"
umap-learn = "0.5.6.*"
xarray = "*"
h5netcdf = "*"
yaml-cpp = "*"
psutil = "*"
netCDF4 = "*"
yaml = "*"

[target.linux-64.dependencies]
cuda-cudart_linux-64 = "12.4.*"

[pypi-dependencies]
bvh = "*"
click = "==8.0.4"
c3d = "*"
dm-tree = "*"
