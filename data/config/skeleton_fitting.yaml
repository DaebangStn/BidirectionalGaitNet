# Skeleton Fitting Optimization Configuration
# Used by C3D_Reader::fitSkeletonMultiFrame()
#
# Marker Mapping Format:
# ======================
# marker_mappings: flat list mapping skeleton marker name → C3D data
#   - {name: 'RASI', data_idx: 10}        # Direct index
#   - {name: 'RASI', data_label: 'R.ASIS'} # Resolved from C3D labels
#
# The bone association is determined from marker XML (default.xml), not here.
# This just maps skeleton marker names to C3D data indices/labels.

skeleton_fitting:
  # Frame range for optimization
  frame_range:
    start: 0      # 0-based start frame
    end: -1       # -1 = all frames, or specific end frame (inclusive)

  # Marker correspondence: skeleton marker name -> C3D data index/label
  # C3D test.c3d labels for reference:
  # [0] Top.Head  [1] Front.Head  [2] Rear.Head  [3] R.Shoulder  [4] R.Offset
  # [5] R.Elbow   [6] R.Wrist     [7] L.Shoulder [8] L.Elbow     [9] L.Wrist
  # [10] R.ASIS   [11] L.ASIS     [12] V.Sacral  [13] R.Thigh    [14] R.Knee
  # [15] R.Shank  [16] R.Ankle    [17] R.Heel    [18] R.Toe      [19] L.Thigh
  # [20] L.Knee   [21] L.Shank    [22] L.Ankle   [23] L.Heel     [24] L.Toe
  marker_mappings:
    # Pelvis markers
    - {name: 'RASI', data_idx: 10}
    - {name: 'LASI', data_idx: 11}
    - {name: 'VSAC', data_idx: 12}
    # Virtual hip joint centers (computed by Harrington method, indices 25, 26)
    # - {name: 'R_Hip', data_idx: 25}
    # - {name: 'L_Hip', data_idx: 26}

    # FemurR markers
    # - {name: 'RTHI', data_idx: 13}
    # - {name: 'RKNE', data_idx: 14}

    # TibiaR markers
    # - {name: 'RSHA', data_idx: 15}
    # - {name: 'RANK', data_idx: 16}

    # TalusR markers
    # - {name: 'RHEE', data_idx: 17}
    # - {name: 'R.TO', data_idx: 18}

    # FemurL markers
    # - {name: 'LTHI', data_idx: 19}
    # - {name: 'LKNE', data_idx: 20}

    # TibiaL markers
    # - {name: 'LSHA', data_idx: 21}
    # - {name: 'LANK', data_idx: 22}

    # TalusL markers
    # - {name: 'LHEE', data_idx: 23}
    # - {name: 'L.TO', data_idx: 24}

    # Upper body markers
    # - {name: 'THEA', data_idx: 0}
    # - {name: 'FHEA', data_idx: 1}
    # - {name: 'RHEA', data_idx: 2}
    # - {name: 'RSHO', data_idx: 3}
    # - {name: 'ROFF', data_idx: 4}
    # - {name: 'RELB', data_idx: 5}
    # - {name: 'RWRI', data_idx: 6}
    # - {name: 'LSHO', data_idx: 7}
    # - {name: 'LELB', data_idx: 8}
    # - {name: 'LWRI', data_idx: 9}

  optimization:
    max_iterations: 10
    convergence_threshold: 1.0e-6
    plot_convergence: true
    # Bones to optimize (bone names from skeleton)
    # Bone-marker association is determined from marker XML, not here
    target:
      - Pelvis
      # - FemurR
      # - TibiaR
      # - TalusR
      # - FemurL
      # - TibiaL
      # - TalusL
      # - Head
      # - Torso
      # - ArmR
      # - ArmL
